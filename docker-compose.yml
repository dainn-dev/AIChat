services:
  db:
    # pgvector/pgvector ships PostgreSQL 16 with the `vector` extension prebuilt.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aichat
      POSTGRES_PASSWORD: aichat
      POSTGRES_DB: aichat
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aichat -d aichat']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    # Backs the BullMQ memory-extraction worker (MS-4 / DAI-149).
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: aichat
      DATABASE_PASSWORD: aichat
      DATABASE_NAME: aichat
      MEMORY_EXTRACTION_ENABLED: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'

volumes:
  pgdata:
