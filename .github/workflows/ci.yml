name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Backend lives under backend/ (monorepo; mobile/ added in the mobile phase).
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        # pgvector image so `CREATE EXTENSION vector` succeeds in migrations.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aichat
          POSTGRES_PASSWORD: aichat
          POSTGRES_DB: aichat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aichat -d aichat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: aichat
      DATABASE_PASSWORD: aichat
      DATABASE_NAME: aichat

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Run migrations (enables pgvector)
        run: npm run migration:run

      - name: Verify pgvector extension is present
        run: |
          PGPASSWORD=aichat psql -h localhost -U aichat -d aichat -tAc \
            "SELECT 1 FROM pg_extension WHERE extname = 'vector';" | grep -q 1
          echo "pgvector extension is present."

      - name: Verify Top-K retrieval uses the HNSW index (DAI-147 AC)
        run: |
          # A Top-K cosine query must plan onto idx_memories_embedding_hnsw,
          # not a seq scan. enable_seqscan=off makes the assertion deterministic
          # on a fresh DB; if the HNSW index were missing the planner would fall
          # back to a seq scan and this check would fail.
          PLAN=$(PGPASSWORD=aichat psql -h localhost -U aichat -d aichat -tAc \
            "SET enable_seqscan = off;
             EXPLAIN SELECT id FROM memories
               ORDER BY embedding <=> array_fill(0.1::real, ARRAY[1536])::vector
               LIMIT 5;")
          echo "$PLAN"
          echo "$PLAN" | grep -q "idx_memories_embedding_hnsw"
          echo "Top-K query uses the HNSW index."

      - name: E2E tests
        run: npm run test:e2e
